<style>

.stars span{position:absolute;border-radius:50%;animation:tw var(--d,3s) ease-in-out infinite;opacity:.3}

  $('p3').innerHTML+='<div class=md onclick=this.remove()><div class=mi onclick=event.stopPropagation()><div class="cw '+_gr(ri)+'"><span class=be>'+c.emoji+'</span><div class="nm '+_id(ri)+'">'+c.name+'</div><div class=de>'+c.description+'</div><div><span class="bd '+_bg(ri)+'">'+c.rarity.toUpperCase()+' '+(c.count>0?'x'+c.count:'')+'</span></div>'+(c.obtained?'<div class=cs><div class=csb><div class=v>❤️'+(c.hp||42)+'</div><div class=l>HP</div></div><div class=csb><div class=v>⚔️'+(c.atk||10)+'</div><div class=l>ATK</div></div><div class=csb><div class=v>🛡️'+(c.def||5)+'</div><div class=l>DEF</div></div></div>':'')+'<div class="cl '+_bg(ri)+'"></div>'+(c.obtained&&!eq?'<button class="b b-g" style="margin-top:8px" onclick="eC('+c.id+')">⭐ Сделать главным</button>':'')+(eq?'<div style="margin-top:8px;padding:8px;background:rgba(251,191,36,.08);border-radius:8px;font-size:13px;color:var(--gd)">⭐ Главный персонаж</div>':'')+'<button class="b b-p" style="margin-top:6px" onclick="q(\'.md\').remove()">✕ Закрыть</button></div></div>'
}
async function eC(id){try{var r=await ap('/set-main-card/'+uid+'/'+id,{method:'POST'});T(r.message,'s');qa('.md').forEach(function(m){m.remove()});await fP();rC();if(q('.tb-b[data-p="p1"].on'))rP()}catch(e){T(e.message,'e')}}

function rW(){
  try{
    if(typeof GDWave==='undefined'){$('p4').innerHTML='<div class=sf style=text-align:center;padding:32px><div style=font-size:48px>🌊</div><div style=color:var(--tx2);margin-top:8px>Игра не загружена</div></div>';return}
    if(typeof GDWave.destroy==='function')GDWave.destroy();
    $('p4').innerHTML='<div id=gdwRoot></div>';
    setTimeout(function(){
      var c=$('gdwRoot');
      if(c)GDWave.init(c, function(score,data){});
    },50);
  }catch(e){
    var el=$('p4');
    if(el)el.innerHTML='<div class=sf style=text-align:center;padding:32px><div style=font-size:36px>⚠️</div><div style=color:var(--rd);margin:8px 0>'+e.message+'</div><button class="b b-g" onclick="rW()">🔄</button></div>';
  }
}

async function rA(){
  if(!ud.is_admin){$('p6').innerHTML='<div class=sf style=text-align:center;padding:48px><div style=font-size:48px;margin-bottom:8px>🔒</div><div style=color:var(--tx2)>Нет доступа</div></div>';return}
  $('p6').innerHTML='<div class=sf><div style=font-size:16px;font-weight:700;margin-bottom:8px>⚙️ Админ-панель</div><div style=display:flex;flex-direction:column;gap:8px><input id=adUid type=number placeholder="Telegram ID" style="background:var(--sf2);border:1px solid var(--sf3);border-radius:8px;padding:10px;color:var(--tx);font-size:14px;outline:none"><div style=display:flex;gap:6px><button class="b b-d b-sm" onclick="aBan()" style=flex:1>🔨 Забанить</button><button class="b b-gr b-sm" onclick="aUnban()" style=flex:1>✅ Разбанить</button></div><button class="b b-p b-sm" onclick="aCheck()">🔍 Проверить</button><div id=adRes style="font-size:13px;padding:6px;color:var(--tx2)"></div></div></div><div class=sf><div style=font-size:14px;font-weight:600;margin-bottom:6px>📋 Быстрые команды бота</div><div style=font-size:12px;color:var(--tx2);line-height:1.8>/ban &lt;id&gt; [причина] — забанить<br>/unban &lt;id&gt; — разбанить<br>/admin — меню админа</div></div>';
}
async function aBan(){
  var tid=$('adUid').value.trim();if(!tid){T('Введите Telegram ID','e');return}
  try{var r=await ap('/admin/ban/'+tid,{method:'POST',body:JSON.stringify({admin_id:uid})});T(r.message,'s');$('adRes').textContent='✅ '+r.message}catch(e){T(e.message,'e');$('adRes').textContent='❌ '+e.message}
}
async function aUnban(){
  var tid=$('adUid').value.trim();if(!tid){T('Введите Telegram ID','e');return}
  try{var r=await ap('/admin/unban/'+tid,{method:'POST',body:JSON.stringify({admin_id:uid})});T(r.message,'s');$('adRes').textContent='✅ '+r.message}catch(e){T(e.message,'e');$('adRes').textContent='❌ '+e.message}
}
async function aCheck(){
  var tid=$('adUid').value.trim();if(!tid){T('Введите Telegram ID','e');return}
  try{var r=await ap('/admin/check/'+tid);var st=r.is_banned?'🔴 Забанен':'🟢 Активен';$('adRes').innerHTML='Статус <b>'+tid+'</b>: '+st+(r.is_admin?' | ⚙️ Админ':'')}catch(e){$('adRes').textContent='❌ '+e.message}
}

async function rT(){
  $('p5').innerHTML='<div class=ld><div class=spn></div><span>Загрузка топа...</span></div>';
  try{
    var lb=await ap('/leaderboard?limit=20');var md=['🥇','🥈','🥉'];
    if(!lb||!lb.length){$('p5').innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:8px">🏆</div><div style="color:var(--tx2)">Топ пуст. Играйте и собирайте трофеи!</div></div>';return}
    var h='<div class=sf style="font-weight:700">🏆 Топ игроков</div>';
    var help=function(lbh){var p=lbh.p;var e=lbh.e;var n=e.username||'ID '+e.telegram_id;var me=e.telegram_id===uid;var av=e.main_emoji||'❓';return'<div class=sf style="'+(me?'background:var(--sf2);border:1px solid rgba(251,191,36,.2)':'')+'"><div class=lb-e><div class=lb-p>'+(md[p]||(p+1))+'</div><div class=lb-av>'+av+'</div><div class=lb-n>'+n+(me?' ⭐':'')+'</div><div class=lb-s>🃏'+(e.unique_cards||0)+' 🏆'+(e.trophies||0)+'</div></div></div>'};
    for(var li=0;li<lb.length;li++)h+=help({p:li,e:lb[li]});
    $('p5').innerHTML=h;
  }catch(e){$('p5').innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:8px">⚠️</div><div style="color:var(--rd);margin-bottom:8px">Ошибка загрузки топа</div><button class="b b-g b-sm" onclick="sp(\'p5\')" style=margin-top:8px>🔄 Повторить</button></div>';T('Топ: '+e.message,'e')}
}

async function rS(){
  var p=$('p7');
  try{
    p.innerHTML='<div class=ld><div class=spn></div><span>Загрузка магазина...</span></div>';
    var pkgs=await ap('/packages');
    var bal=ud.balance||0;
    var h='<div class=sf style="font-weight:700;font-size:18px">⭐ Магазин</div><div class=sf><div style=font-size:13px;color:var(--tx2);margin-bottom:8px>💰 Баланс: <b style=color:var(--gd)>'+bal+'</b> монет</div><div style=font-size:12px;color:var(--tx2);margin-bottom:12px>Покупайте Telegram Stars, чтобы получить монеты и ящики!</div></div>';
    for(var idx=0;idx<pkgs.length;idx++){
      var pkg=pkgs[idx];
      var icons='';for(var si=0;si<Math.min(pkg.stars/15+1,5);si++)icons+='⭐';
      h+='<div class=sf style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="purchaseStars('+idx+')"><div style="font-size:32px;min-width:50px;text-align:center">'+icons+'</div><div style=flex:1><div style=font-weight:700;font-size:16px>'+pkg.stars+' Stars</div><div style=font-size:11px;color:var(--tx2)>🪙 +'+pkg.coins+' монет &bull; 🎁 +'+pkg.boxes+' ящиков</div></div><button class="b b-g b-sm">💎 '+pkg.stars+' ⭐</button></div>'
    }
    h+='<div class=sf style=text-align:center;font-size:11px;color:var(--tx2)>💡 Оплата через Telegram Stars. После оплаты бонус зачисляется автоматически.</div>';
    p.innerHTML=h;
  }catch(e){p.innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:36px">⚠️</div><div style="color:var(--rd);margin:8px 0">'+e.message+'</div><button class="b b-p b-sm" onclick="sp(\'p7\')">🔄 Повторить</button></div>'}
}

async function purchaseStars(idx){
  if(!uid){T('Нет пользователя','e');return}
  try{
    _pR();
    var r=await ap('/create-invoice/'+uid+'/'+idx,{method:'POST'});
    if(r&&r.link){
      _pS();
      if(tg&&tg.openLink)tg.openLink(r.link);
      else if(tg&&tg.openTelegramLink)tg.openTelegramLink(r.link);
      else window.open(r.link);
    }else{
      T('Ошибка создания счёта','e');_pE();
    }
  }catch(e){
    T('Ошибка: '+e.message,'e');_pE();
  }
}

function showBanScreen(){
  $('ct').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:60vh"><div style=font-size:64px;margin-bottom:12px>🚫</div><h2 style=margin-bottom:4px>Вы забанены</h2><p style=color:var(--tx2);margin-bottom:16px>Обратитесь к администратору</p><button class="b b-p" onclick="chkBan()">🔄 Проверить статус</button></div>';
}
async function chkBan(){
  try{
    await fP();
    if(!ud.is_banned){$('ct').innerHTML='<div id=p1 class=pg></div><div id=p2 class=pg></div><div id=p3 class=pg></div><div id=p4 class=pg></div><div id=p5 class=pg></div><div id=p6 class=pg></div><div id=p7 class=pg></div>';sp('p1')}
    else T('Всё ещё забанены','e');
  }catch(e){T('Ошибка: '+e.message,'e')}
}

if(!uid){$('ld').innerHTML='<div class=sf style="text-align:center;padding:48px 16px"><div style="font-size:64px;margin-bottom:12px">⚔️</div><h2 style="margin-bottom:4px">Gacha Battle</h2><p style="color:var(--tx2)">Запусти бота в Telegram!</p></div>'}
else{var _lt=setTimeout(function(){try{$('ld').innerHTML='<div class=sf style="text-align:center;padding:48px"><div style="font-size:48px">⏱</div><div style="color:var(--tx2);margin:8px 0">Долгая загрузка...</div><button class="b b-g" onclick="location.reload()">🔄 Повторить</button></div>'}catch(e){}},8000);fP().then(function(){clearTimeout(_lt);if(ud.is_banned){$('ld').style.display='none';showBanScreen();return}sp('p1');$('ld').style.display='none'}).catch(function(e){clearTimeout(_lt);$('ld').innerHTML='<div class=sf style="text-align:center;padding:48px"><p style="color:var(--rd)">❌ '+e.message+'</p><button class="b b-g" style="margin-top:8px" onclick="location.reload()">🔄 Повторить</button></div>'})}
</script>
