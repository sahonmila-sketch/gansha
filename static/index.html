<style>

.stars span{position:absolute;border-radius:50%;animation:tw var(--d,3s) ease-in-out infinite;opacity:.3}

<script>
const A=window.location.origin,RS=['common','rare','epic','legendary'];
let tg,uid,ud={};
try{tg=window.Telegram.WebApp;tg.expand();tg.ready();tg.setHeaderColor('#07070f');tg.setBackgroundColor('#07070f');uid=tg.initDataUnsafe?.user?.id}catch(e){}
const $=id=>document.getElementById(id),q=(s,p)=>p?p.querySelector(s):document.querySelector(s),qa=(s,p)=>p?[...p.querySelectorAll(s)]:[...document.querySelectorAll(s)];
const _ri=r=>Math.min(Math.max(RS.indexOf(r),0),3);
const _gr=i=>'g'+i,_id=i=>'c'+i,_bg=i=>'g'+i+'r';

// ── Sound System (Web Audio) ──
const Sfx = {
  _ctx: null,
  _init() {
    if(!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(this._ctx.state === 'suspended') this._ctx.resume();
  },
  _osc(freq, start, dur, vol, type) {
    const o = this._ctx.createOscillator();
    const g = this._ctx.createGain();
    o.type = type || 'sine';
    o.connect(g); g.connect(this._ctx.destination);
    o.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur);
  },
  box() {
    this._init(); const t = this._ctx.currentTime;
    this._osc(400, t, 0.08, 0.25, 'sine');
    this._osc(600, t + 0.06, 0.08, 0.2, 'sine');
    this._osc(800, t + 0.12, 0.1, 0.15, 'sine');
  },
  rare() {
    this._init(); const t = this._ctx.currentTime;
    this._osc(523, t, 0.12, 0.2, 'triangle');
    this._osc(659, t + 0.1, 0.12, 0.18, 'triangle');
    this._osc(784, t + 0.2, 0.18, 0.15, 'triangle');
    this._osc(1047, t + 0.3, 0.25, 0.12, 'triangle');
  },
  epic() {
    this._init(); const t = this._ctx.currentTime;
    for(let i = 0; i < 4; i++) this._osc([392, 523, 659, 784][i], t + i * 0.12, 0.2, 0.2, 'triangle');
    this._osc(1047, t + 0.48, 0.35, 0.15, 'sine');
  },
  legendary() {
    this._init(); const t = this._ctx.currentTime;
    const notes = [523, 659, 784, 1047, 784, 1047, 1319, 1568];
    for(let i = 0; i < notes.length; i++) this._osc(notes[i], t + i * 0.1, 0.25, 0.25, 'sine');
    this._osc(1568, t + 0.8, 0.5, 0.3, 'triangle');
    this._osc(2093, t + 0.9, 0.6, 0.2, 'sine');
  },
  click() {
    this._init(); const t = this._ctx.currentTime;
    this._osc(800, t, 0.02, 0.1, 'square');
  },
  place() {
    this._init(); const t = this._ctx.currentTime;
    this._osc(300, t, 0.05, 0.15, 'sine');
    this._osc(450, t + 0.03, 0.05, 0.1, 'sine');
    this._osc(220, t, 0.03, 0.18, 'triangle');
  },
  drop() {
    this._init(); const t = this._ctx.currentTime;
    this._osc(520, t, 0.06, 0.2, 'sine');
    this._osc(380, t + 0.02, 0.08, 0.15, 'triangle');
    this._osc(620, t + 0.06, 0.04, 0.1, 'sine');
  },
  clearLine() {
    this._init(); const t = this._ctx.currentTime;
    for(let i = 0; i < 6; i++) this._osc(400 + i * 150, t + i * 0.04, 0.1, 0.1, 'sine');
    this._osc(1400, t + 0.25, 0.15, 0.08, 'triangle');
  },
  victory() {
    this._init(); const t = this._ctx.currentTime;
    [523,659,784,1047,1319].forEach((f,i)=>this._osc(f,t+i*0.1,0.2,0.15,'triangle'));
    this._osc(1568, t + 0.5, 0.4, 0.2, 'sine');
  },
  gameOver() {
    this._init(); const t = this._ctx.currentTime;
    for(let i = 0; i < 3; i++) this._osc(400 - i * 100, t + i * 0.2, 0.2, 0.15, 'triangle');
  },
  milestone() {
    this._init(); const t = this._ctx.currentTime;
    for(let i = 0; i < 6; i++) this._osc(400 + i * 150, t + i * 0.08, 0.12, 0.15, 'sine');
    this._osc(1300, t + 0.5, 0.3, 0.2, 'triangle');
  },
  combo(level) {
    this._init(); const t = this._ctx.currentTime; const l = Math.min(level, 10);
    const freqs = [523, 659, 784, 1047, 1319, 1568, 1760, 2093, 2637, 3136];
    const f = freqs[l - 1] || 1047;
    this._osc(f * 0.5, t, 0.08, 0.2, 'sawtooth');
    this._osc(f, t + 0.06, 0.1, 0.25, 'triangle');
    this._osc(f * 1.5, t + 0.12, 0.15, 0.18, 'sine');
    this._osc(f * 2, t + 0.2, 0.22, 0.12, 'sine');
    if(l >= 3) {
      this._osc(f * 3, t + 0.28, 0.35, 0.1, 'triangle');
      this._osc(f * 4, t + 0.35, 0.4, 0.07, 'sine');
    }
  }
};

function T(m,t){const e=$('ts');e.textContent=m;e.style.background=t==='e'?'var(--rd)':t==='s'?'var(--gr)':'#1c1c3a';e.classList.remove('h');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.add('h'),2600)}

function Pt(c){
  Sfx.click();
  const p=$('pt');p.innerHTML='';const n=c===3?50:c===2?25:c===1?12:6;const cl=['#6b7280','#60a5fa','#a78bfa','#fbbf24'][c];
  for(let i=0;i<n;i++){const e=document.createElement('div');e.className='pp';e.style.background=cl;e.style.left=(15+Math.random()*70)+'%';e.style.top=(20+Math.random()*40)+'%';e.style.setProperty('--x',(-120+Math.random()*240)+'px');e.style.setProperty('--y',(-180-Math.random()*250)+'px');e.style.width=e.style.height=(3+Math.random()*8)+'px';p.appendChild(e)}
  if(c===3){const st=['⭐','✨','💫','🌟'];for(let i=0;i<10;i++){const s=document.createElement('div');s.className='sp';s.textContent=st[i%4];s.style.left=(20+Math.random()*60)+'%';s.style.top=(25+Math.random()*30)+'%';s.style.setProperty('--x',(-80+Math.random()*160)+'px');s.style.setProperty('--y',(-150-Math.random()*150)+'px');s.style.setProperty('--x2',(-160+Math.random()*320)+'px');s.style.setProperty('--y2',(-300-Math.random()*200)+'px');p.appendChild(s)}}
  if(tg?.HapticFeedback){if(c===3)tg.HapticFeedback.impactOccurred('heavy');else tg.HapticFeedback.impactOccurred('medium')}
  setTimeout(()=>p.innerHTML='',1800)
}

async function ap(p,o={}){const r=await fetch(''+A+p,{headers:{'Content-Type':'application/json'},...o});if(!r.ok){let m;try{const e=await r.json();m=e.detail||e.message}catch(e){m=r.statusText}throw new Error(m||'Ошибка')}return r.json()}
function fm(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h?h+'ч '+m+'м':m+'м'}
function r2(t){return new Promise(r=>setTimeout(r,t))}

qa('.tb-b').forEach(b=>b.addEventListener('click',()=>sp(b.dataset.p)));
function sp(n){qa('.pg').forEach(p=>p.classList.remove('on'));qa('.tb-b').forEach(b=>b.classList.remove('on'));$(n).classList.add('on');q('.tb-b[data-p="'+n+'"]').classList.add('on');if(typeof BB!=='undefined'){if(n!=='p4'&&BB.canvas){BB.pause()}else if(n==='p4'){if(bbActive&&!(BB.canvas&&$('bbContainer'))){if(typeof BB!=='undefined'&&BB.container)BB.destroy();startBB();return}if(BB.canvas)BB.resume()}}lp(n)}
async function lp(n){if(!uid)return;try{if(n==='p1')await rP();else if(n==='p2')rG();else if(n==='p3')await rC();else if(n==='p4')rBB();else if(n==='p5')await rT();else if(n==='p6')await rA()}catch(e){const m=e&&e.message||'Неизвестная ошибка';T('Ошибка: '+m,'e');const el=$(n);if(el){if(!el.innerHTML.trim()||el.innerHTML.includes('ld')||el.innerHTML.includes('spn'))el.innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:36px">⚠️</div><div style="color:var(--rd);margin:8px 0">'+m+'</div><button class="b b-p b-sm" onclick="sp(\''+n+'\')">🔄</button></div>';else el.innerHTML+='<div class=sf style="text-align:center;margin-top:8px;color:var(--rd)">⚠️ '+m+'</div>'}}}

async function fP(){
  const p=await ap('/profile/'+uid+'?username='+encodeURIComponent(tg?.initDataUnsafe?.user?.username||''));
  ud=p;$('bal').textContent=p.balance;
  if(p.free_boxes>0){$('fb').style.display='inline';$('fc').textContent=p.free_boxes}else $('fb').style.display='none';
  if(p.is_admin){$('admBtn').style.display=''}else{$('admBtn').style.display='none'}
  ud.is_admin=p.is_admin;
  return p;
}

async function rP(){
  const p=await fP();const mc=p.main_card&&p.main_card.emoji?p.main_card:null;const ri=mc?_ri(mc.rarity):0;const is1=p.rank===1;
  const crown=is1?'<div class=rank-crown>👑</div>':'';const fires=is1?'<div class=rank-fires></div>':'';
  const rb=is1?'<div class="rank-badge t1">👑 #1 Мастер</div>':'<div class=rank-badge>🏅 #'+(p.rank||'?')+'</div>';
  const mcH=mc?'<div class="cw '+_gr(ri)+'" style="margin:-6px -6px 8px">'+crown+fires+'<div style="margin:'+(is1?'28px':'8px')+' 0 4px"><span class=be>'+mc.emoji+'</span></div><div class="nm '+_id(ri)+'" style="font-size:22px">'+mc.name+'</div><div style="font-size:11px;color:var(--tx2);margin:2px 0">⭐ lv'+mc.level+'</div>'+rb+'<div class=cs><div class=csb><div class="v '+_id(ri)+'">❤️'+(mc.hp||0)+'</div><div class=l>HP</div></div><div class=csb><div class="v '+_id(ri)+'">⚔️'+(mc.atk||0)+'</div><div class=l>ATK</div></div><div class=csb><div class="v '+_id(ri)+'">🛡️'+(mc.def||0)+'</div><div class=l>DEF</div></div></div><div class="cl '+_bg(ri)+'"'+(is1?' style="background:linear-gradient(90deg,var(--gd),var(--or),var(--gd))"':'')+'></div><button class="b b-sm b-p" onclick="sp(\'p3\')">⭐ Сменить</button></div>':'<div class="cw g0" style="margin:-6px -6px 8px;cursor:pointer" onclick="sp(\'p2\')"><div style="font-size:56px;margin:8px 0">❓</div><div style="font-size:14px;opacity:.6">Персонаж не выбран</div><div style="font-size:11px;color:var(--tx2);margin-top:4px">Открой ящик!</div></div>';
  const db=p.can_claim_daily?'<button class="b b-gr" onclick="cD()">🎁 Забрать бонус</button>':'<div style="text-align:center;color:var(--tx2);font-size:13px;padding:6px">⏳ Бонус через '+fm(p.daily_cooldown)+'</div>';
  const ar=p.arena_rating||0;const br=p.bb_rating||0;
  $('p1').innerHTML=mcH+'<div class=sf><div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap"><div style="background:var(--sf2);border-radius:8px;padding:10px;flex:1;min-width:80px;text-align:center"><div style="font-size:18px;font-weight:700">'+p.balance+'</div><div style="font-size:9px;color:var(--tx2)">💰 Монет</div></div><div style="background:var(--sf2);border-radius:8px;padding:10px;flex:1;min-width:80px;text-align:center"><div style="font-size:18px;font-weight:700">'+p.level+'</div><div style="font-size:9px;color:var(--tx2)">⭐ Ур.</div></div><div style="background:var(--sf2);border-radius:8px;padding:10px;flex:1;min-width:80px;text-align:center"><div style="font-size:18px;font-weight:700">'+(p.trophies||0)+'</div><div style="font-size:9px;color:var(--tx2)">🏆 Троф.</div></div><div style="background:var(--sf2);border-radius:8px;padding:10px;flex:1;min-width:80px;text-align:center"><div style="font-size:18px;font-weight:700">'+p.unique_cards+'</div><div style="font-size:9px;color:var(--tx2)">🃏 Карт</div></div><div style="background:var(--sf2);border-radius:8px;padding:10px;flex:1;min-width:80px;text-align:center"><div style="font-size:18px;font-weight:700">'+(p.battles_won||0)+'</div><div style="font-size:9px;color:var(--tx2)">⚔️ Побед</div></div><div style="background:var(--sf2);border-radius:8px;padding:10px;flex:1;min-width:80px;text-align:center"><div style="font-size:18px;font-weight:700">'+p.boxes_opened+'</div><div style="font-size:9px;color:var(--tx2)">🎁 Ящиков</div></div></div><div style="display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap"><div style="background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(124,58,237,.04));border-radius:8px;padding:6px 12px;text-align:center;border:1px solid rgba(124,58,237,.15)"><div style="font-size:14px;font-weight:700;color:var(--p2)">'+ar+'</div><div style="font-size:9px;color:var(--tx2)">⚔️ Рейтинг</div></div><div style="background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,191,36,.03));border-radius:8px;padding:6px 12px;text-align:center;border:1px solid rgba(251,191,36,.12)"><div style="font-size:14px;font-weight:700;color:var(--gd)">'+br+'</div><div style="font-size:9px;color:var(--tx2)">🧩 BB</div></div></div></div><div class=sf>'+db+'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;color:var(--tx2)">🔗 <b style="color:var(--tx)">'+p.referral_code+'</b></span><span style="font-size:11px;background:var(--sf2);padding:4px 10px;border-radius:6px;cursor:pointer" onclick="cR()">📋 Копировать</span></div></div>';
}
async function cD(){try{Sfx.click();const r=await ap('/daily-claim/'+uid,{method:'POST'});T(r.message,'s');rP()}catch(e){T(e.message,'e')}}
function cR(){if(ud.referral_code){navigator.clipboard?.writeText(ud.referral_code);T('Скопировано!','s')}}

function rG(){
  try{
    const fr=ud&&ud.free_boxes||0;
    $('p2').innerHTML='<div class=sf><div class=ga><button class=gb id=gb>🎁</button><div style="font-size:14px;font-weight:600;margin:4px 0">Открыть ящик</div><div class=gi id=gi>'+(fr?'🎁 Бесплатно: '+fr:'💰 Цена: 10 монет')+'</div></div><div id=gR></div></div>';
    const gb=$('gb');if(gb)gb.onclick=dG;
  }catch(e){$('p2').innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:48px">🎁</div><div style="color:var(--tx2);margin-top:8px">Ошибка</div><button class="b b-g b-sm" style="margin-top:8px" onclick="sp(\'p2\')">🔄</button></div>';T('Ящик: '+e.message,'e')}
}
async function dG(){
  Sfx.box();
  const b=$('gb'),r=$('gR');b.classList.remove('sh');void b.offsetWidth;b.classList.add('sh');r.innerHTML='<div class=ld style=padding:12px><div class=spn></div></div>';
  try{
    const o=await ap('/open-box/'+uid,{method:'POST'});const c=o.card;const ri=_ri(c.rarity);
    if(ri===3){Sfx.legendary()}else if(ri===2){Sfx.epic()}else if(ri===1){Sfx.rare()}
    setTimeout(()=>{b.classList.remove('sh');Pt(ri);$('bal').textContent=o.balance_after;if(o.free_boxes_after>0){$('fb').style.display='inline';$('fc').textContent=o.free_boxes_after}else $('fb').style.display='none';ud.balance=o.balance_after;ud.free_boxes=o.free_boxes_after;r.innerHTML='<div class=cr style=text-align:center><div class="cw '+_gr(ri)+'"><span class=be>'+c.emoji+'</span><div class="nm '+_id(ri)+'">'+c.name+'</div><div class=de>'+c.description+'</div><div><span class="bd '+_bg(ri)+'" style="color:'+(ri===3?'#0f0f22':'#fff')+'">'+c.rarity.toUpperCase()+'</span></div>'+(o.is_new?'<div style="margin-top:6px;font-size:14px;font-weight:700;color:var(--gd)">🎉 НОВАЯ КАРТА!</div>':'')+'<div class="cl '+_bg(ri)+'"></div></div><div style="font-size:12px;color:var(--tx2);margin-top:6px">💰 '+o.balance_after+' монет'+(o.free_boxes_after?' | 🎁 '+o.free_boxes_after+' бесплатно':'')+'</div></div>';if(o.is_new&&ri===3)T('🔥 ЛЕГЕНДАРНАЯ КАРТА!','s')
    },600)
  }catch(e){b.classList.remove('sh');r.innerHTML='<div style="text-align:center;color:var(--rd);padding:16px">❌ '+e.message+'</div>'}
}

async function rC(){
  const cl=await ap('/collection/'+uid+'?_='+Date.now());const ow=cl.filter(x=>x.obtained);const mi=(ud.main_card||{}).id;
  let h='<div class=sf style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700">📦 Коллекция</span><span style="font-size:13px;color:var(--tx2)">'+ow.length+'/'+cl.length+'</span></div>';
  for(let i=0;i<4;i++){const r=RS[i];const ch=cl.filter(x=>x.rarity===r);if(!ch.length)continue;const oc=ch.filter(x=>x.obtained).length;h+='<div style="margin:4px 0"><div style="display:flex;align-items:center;gap:6px;padding:5px 4px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:'+['#6b7280','#60a5fa','#a78bfa','#fbbf24'][i]+'">■ '+r+' ('+oc+'/'+ch.length+')</div><div class=cg>';ch.forEach(x=>{const eq=x.id===mi;h+='<div class="cc '+(x.obtained?'':'mi')+' '+(eq?'eq':'')+'" onclick="'+(x.obtained?'iC('+x.id+')':'')+'">'+(eq?'<div class=st>⭐</div>':'')+'<span class=em>'+x.emoji+'</span><div class="nm '+(x.obtained?_id(_ri(x.rarity)):'')+'">'+(x.obtained?x.name:'❓')+'</div>'+(x.obtained?'<div class=cn>x'+x.count+'</div>':'')+'<div class="rl '+_bg(_ri(x.rarity))+'" style="opacity:'+(x.obtained?'1':'.15')+'"></div></div>'});h+='</div></div>'}
  if(!ow.length)h+='<div class=sf style="text-align:center;padding:32px 16px"><div style="font-size:48px;margin-bottom:8px">🎁</div><div style="color:var(--tx2)">Нет карт. Открой ящик!</div></div>';
  $('p3').innerHTML=h;
}
async function iC(id){
  const cl=await ap('/collection/'+uid);const c=cl.find(x=>x.id===id);if(!c)return;const mi=(ud.main_card||{}).id;const eq=c.id===mi;const ri=_ri(c.rarity);
  $('p3').innerHTML+='<div class=md onclick=this.remove()><div class=mi onclick=event.stopPropagation()><div class="cw '+_gr(ri)+'"><span class=be>'+c.emoji+'</span><div class="nm '+_id(ri)+'">'+c.name+'</div><div class=de>'+c.description+'</div><div><span class="bd '+_bg(ri)+'">'+c.rarity.toUpperCase()+' '+(c.count>0?'x'+c.count:'')+'</span></div>'+(c.obtained?'<div class=cs><div class=csb><div class=v>❤️'+(c.hp||42)+'</div><div class=l>HP</div></div><div class=csb><div class=v>⚔️'+(c.atk||10)+'</div><div class=l>ATK</div></div><div class=csb><div class=v>🛡️'+(c.def||5)+'</div><div class=l>DEF</div></div></div>':'')+'<div class="cl '+_bg(ri)+'"></div>'+(c.obtained&&!eq?'<button class="b b-g" style="margin-top:8px" onclick="eC('+c.id+')">⭐ Сделать главным</button>':'')+(eq?'<div style="margin-top:8px;padding:8px;background:rgba(251,191,36,.08);border-radius:8px;font-size:13px;color:var(--gd)">⭐ Главный персонаж</div>':'')+'<button class="b b-p" style="margin-top:6px" onclick="q(\'.md\').remove()">✕ Закрыть</button></div></div>'
}
async function eC(id){try{const r=await ap('/set-main-card/'+uid+'/'+id,{method:'POST'});T(r.message,'s');qa('.md').forEach(m=>m.remove());await fP();rC();if(q('.tb-b[data-p="p1"].on'))rP()}catch(e){T(e.message,'e')}}

// ── Block Blast ──
let bbActive=false, bbRating=0;
async function rBB(){
  try{
    const hs=parseInt(localStorage.getItem('bb_highscore')||'0');
    if(bbActive){
      if($('bbContainer')&&typeof BB!=='undefined'&&BB.canvas)return;
      if(typeof BB!=='undefined'&&BB.container)BB.destroy();
      startBB();
      return
    }
    let ar=0;let d;try{d=await ap('/bb-data/'+uid);bbRating=(d&&d.rating)||0;ar=(d&&d.arena_rating)||0;if(d&&d.multiplier)window._bbMult=d.multiplier;if(d&&d.combined_rating)window._bbCombined=d.combined_rating}catch(e){}
    bbRating=bbRating||0;ar=ar||0;
    let mh='';
    if(bbRating>0||ar>0){
      mh='<div class=sf><div style="display:flex;justify-content:space-between;font-size:12px;padding:0 2px 4px">'+(bbRating>0?'<span>⭐ BB Рейтинг: <b>'+bbRating+'</b></span>':'')+(ar>0?'<span style=color:var(--tx2)>⚔️ Арена: <b>'+ar+'</b></span>':'')+'<span style=color:var(--tx2)>🏆 Рекорд: '+hs+'</span></div>';
      const next=d&&d.next_milestone?d.next_milestone:null;
      if(bbRating>0&&next){
        const pct=next?Math.min(100,(bbRating/next.threshold)*100):0;
        mh+='<div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style=color:var(--tx2)>'+bbRating+'</span><div class=ho><div class="hi h" style="width:'+pct+'%"></div></div><span style=color:var(--gd);font-weight:700>'+next.threshold+'</span></div><div style=font-size:10px;color:var(--tx2);text-align:center;margin-top:2px>🎁 '+next.reward+' ящиков</div>'
      }
      mh+='</div>'
      if(d&&d.unclaimed&&d.unclaimed.length){mh+='<div class=sf style=text-align:center>';for(const t of d.unclaimed){const r=d.milestones.find(m=>m.threshold===t);mh+='<button class="b b-g b-sm" onclick="cBM('+t+')" style=margin:2px>🎁 '+t.toLocaleString()+' — '+(r?r.reward:'?')+' ящиков</button>'}mh+='</div>'}
    }
    const mb=window._bbMult||1;
    const mbHtml=mb>1?'<div style="font-size:11px;color:var(--tx2);margin-bottom:6px">⭐ Множитель: <b style="color:var(--gd)">x'+mb+'</b> <span style="color:var(--tx2);font-size:10px">(карты + коллекция)</span></div>':'';
    $('p4').innerHTML=mh+'<div class=sf style=text-align:center><div style="font-size:48px;margin-bottom:4px">🧩</div><div style="font-size:18px;font-weight:700;margin-bottom:2px">Блок Бласт</div><div style="font-size:12px;color:var(--tx2);margin-bottom:8px">Собери наибольший счёт!</div>'+(hs>0?'<div style="font-size:13px;color:var(--gd);margin-bottom:8px">🏆 Рекорд: <b>'+hs+'</b></div>':'')+mbHtml+'<button class="b b-g bb-btn" onclick="startBB()">▶ Играть</button></div>'
  }catch(e){const el=$('p4');if(el)el.innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:36px">⚠️</div><div style="color:var(--rd);margin:8px 0">Ошибка загрузки</div><button class="b b-g" onclick="startBB()">▶ Играть</button></div>'}
}
async function cBM(t){
  try{const r=await ap('/claim-bb-milestone/'+uid+'/'+t,{method:'POST'});T('🎁 Получено '+r.reward,'s');await fP();rBB()}catch(e){T(e.message,'e')}
}
function startBB(){
  bbActive=true;
  const cb=window._bbMult||1;
  const cr=window._bbCombined||0;
  $('p4').innerHTML='<div id=bbContainer></div>';
  setTimeout(function(){
    try{
      const c=$('bbContainer');
      if(!c)return;
      if(typeof BB==='undefined'){c.innerHTML='<div class=sf style=text-align:center;padding:32px;color:var(--rd)">⚠️ Скрипт игры не загружен<br><button class="b b-g b-sm" onclick="startBB()" style=margin-top:8px>🔄 Повторить</button></div>';return}
      if(typeof BB.destroy==='function')BB.destroy();
      BB.init(c, 0, function(score){
        const hs=parseInt(localStorage.getItem('bb_highscore')||'0');
        if(score>hs)localStorage.setItem('bb_highscore',score);
        bbActive=false;
        (async()=>{
          try{
            const r=await ap('/submit-bb-score/'+uid,{method:'POST',body:JSON.stringify({score:Math.round(score)})});
            if(r.new_milestones&&r.new_milestones.length){
              Sfx.milestone();
              let txt='';
              for(const m of r.new_milestones)txt+='🎯 '+m.threshold.toLocaleString()+' → 🎁 '+m.reward+' ящиков\n';
              T(txt,'s');
            }
          }catch(e){}
          rBB();
        })();
      }, cr || bbRating, cb);
    }catch(e){
      const el=$('bbContainer')||$('p4');
      if(el)el.innerHTML='<div class=sf style=text-align:center;padding:32px"><div style=font-size:36px>⚠️</div><div style="color:var(--rd);margin:8px 0">Ошибка: '+(e.message||'неизвестная')+'</div><button class="b b-g b-sm" onclick="startBB()">🔄 Повторить</button></div>';
    }
  },100);
}
        }catch(e){}
        rBB();
      })();
    }, cr || bbRating, cb);
  },100);
}

// ── Admin Panel ──
async function rA(){
  if(!ud.is_admin){$('p6').innerHTML='<div class=sf style=text-align:center;padding:48px><div style=font-size:48px;margin-bottom:8px>🔒</div><div style=color:var(--tx2)>Нет доступа</div></div>';return}
  $('p6').innerHTML='<div class=sf><div style=font-size:16px;font-weight:700;margin-bottom:8px>⚙️ Админ-панель</div><div style=display:flex;flex-direction:column;gap:8px><input id=adUid type=number placeholder="Telegram ID" style="background:var(--sf2);border:1px solid var(--sf3);border-radius:8px;padding:10px;color:var(--tx);font-size:14px;outline:none"><div style=display:flex;gap:6px><button class="b b-d b-sm" onclick="aBan()" style=flex:1>🔨 Забанить</button><button class="b b-gr b-sm" onclick="aUnban()" style=flex:1>✅ Разбанить</button></div><button class="b b-p b-sm" onclick="aCheck()">🔍 Проверить</button><div id=adRes style="font-size:13px;padding:6px;color:var(--tx2)"></div></div></div><div class=sf><div style=font-size:14px;font-weight:600;margin-bottom:6px>📋 Быстрые команды бота</div><div style=font-size:12px;color:var(--tx2);line-height:1.8>/ban &lt;id&gt; [причина] — забанить<br>/unban &lt;id&gt; — разбанить<br>/admin — меню админа</div></div>';
}
async function aBan(){
  const tid=$('adUid').value.trim();if(!tid){T('Введите Telegram ID','e');return}
  try{const r=await ap('/admin/ban/'+tid,{method:'POST',body:JSON.stringify({admin_id:uid})});T(r.message,'s');$('adRes').textContent='✅ '+r.message}catch(e){T(e.message,'e');$('adRes').textContent='❌ '+e.message}
}
async function aUnban(){
  const tid=$('adUid').value.trim();if(!tid){T('Введите Telegram ID','e');return}
  try{const r=await ap('/admin/unban/'+tid,{method:'POST',body:JSON.stringify({admin_id:uid})});T(r.message,'s');$('adRes').textContent='✅ '+r.message}catch(e){T(e.message,'e');$('adRes').textContent='❌ '+e.message}
}
async function aCheck(){
  const tid=$('adUid').value.trim();if(!tid){T('Введите Telegram ID','e');return}
  try{const r=await ap('/admin/check/'+tid);const st=r.is_banned?'🔴 Забанен':'🟢 Активен';$('adRes').innerHTML='Статус <b>'+tid+'</b>: '+st+(r.is_admin?' | ⚙️ Админ':'')}catch(e){$('adRes').textContent='❌ '+e.message}
}

async function rT(){
  $('p5').innerHTML='<div class=ld><div class=spn></div><span>Загрузка топа...</span></div>';
  try{
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
    const lb=await ap('/leaderboard?limit=20',{signal:ctrl.signal});const md=['🥇','🥈','🥉'];
    if(!lb||!lb.length){$('p5').innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:8px">🏆</div><div style="color:var(--tx2)">Топ пуст. Играйте и собирайте трофеи!</div></div>';return}
    let h='<div class=sf style="font-weight:700">🏆 Топ игроков</div>';
    lb.forEach((e,i)=>{const p=i+1,n=e.username||'ID '+e.telegram_id,me=e.telegram_id===uid,av=e.main_emoji||'❓';
      h+='<div class=sf style="'+(me?'background:var(--sf2);border:1px solid rgba(251,191,36,.2)':'')+'"><div class=lb-e><div class=lb-p>'+(md[i]||p)+'</div><div class=lb-av>'+av+'</div><div class=lb-n>'+n+(me?' ⭐':'')+'</div><div class=lb-s>🃏'+(e.unique_cards||0)+' 🏆'+(e.trophies||0)+'</div></div></div>'});
    $('p5').innerHTML=h;
  }catch(e){$('p5').innerHTML='<div class=sf style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:8px">⚠️</div><div style="color:var(--rd);margin-bottom:8px">Ошибка загрузки топа</div><button class="b b-g b-sm" onclick="sp(\'p5\')" style=margin-top:8px>🔄 Повторить</button></div>';T('Топ: '+e.message,'e')}
}

function showBanScreen(){
  $('ct').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:60vh"><div style=font-size:64px;margin-bottom:12px>🚫</div><h2 style=margin-bottom:4px>Вы забанены</h2><p style=color:var(--tx2);margin-bottom:16px>Обратитесь к администратору</p><button class="b b-p" onclick="chkBan()">🔄 Проверить статус</button></div>';
}
async function chkBan(){
  try{
    await fP();
    if(!ud.is_banned){$('ct').innerHTML='<div id=p1 class=pg></div><div id=p2 class=pg></div><div id=p3 class=pg></div><div id=p4 class=pg></div><div id=p5 class=pg></div><div id=p6 class=pg></div>';sp('p1')}
    else T('Всё ещё забанены','e');
  }catch(e){T('Ошибка: '+e.message,'e')}
}

if(!uid){$('ld').innerHTML='<div class=sf style="text-align:center;padding:48px 16px"><div style="font-size:64px;margin-bottom:12px">⚔️</div><h2 style="margin-bottom:4px">Gacha Battle</h2><p style="color:var(--tx2)">Запусти бота в Telegram!</p></div>'}
else{fP().then(()=>{if(ud.is_banned){$('ld').style.display='none';showBanScreen();return}sp('p1');$('ld').style.display='none'}).catch(e=>{$('ld').innerHTML='<div class=sf style="text-align:center;padding:48px"><p style="color:var(--rd)">❌ '+e.message+'</p></div>'})}
</script>
